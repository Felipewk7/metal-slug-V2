<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Neon Justice | Metal Slug Style Run 'n Gun</title>
    <link rel="stylesheet" href="src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="ui-header">
            <div class="score-container">
                <span class="label">SCORE:</span>
                <span id="score">000000</span>
            </div>
            <div class="weapon-container">
                <span class="label">WEAPON:</span>
                <span id="weapon-name">PISTOL</span>
            </div>
            <div class="health-bar-wrapper">
                <div id="health-bar"></div>
            </div>
        </header>

        <main id="game-container">
            <canvas id="game-canvas"></canvas>
            <div id="overlay" class="hidden">
                <h1 id="overlay-title">GAME OVER</h1>
                <button id="restart-btn">RESTART MISSION</button>
            </div>
        </main>

        <footer class="ui-footer">
            <p>[WASD] Move | [SPACE] Shoot | [Shift] Jump</p>
        </footer>
    </div>
    <script type="module" src="src/main.js"></script>
</body>

</html>
